name: Build Android APK

# Build an installable debug APK in the cloud — no Android Studio needed.
# Run it from the repo's Actions tab (Run workflow), then download the APK
# from the run's "Artifacts" section and install it on your phone.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        run: npm test

      - name: Inject Gemini API key (optional)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            sed -i "s|GEMINI_API_KEY: ''|GEMINI_API_KEY: '${GEMINI_API_KEY}'|" www/config.js
            echo "Gemini key injected."
          else
            echo "No GEMINI_API_KEY secret set — build the APK, but set the key in www/config.js (or add the secret) before it can read screenshots."
          fi

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Add contacts permissions to manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.READ_CONTACTS"/>\n    <uses-permission android:name="android.permission.WRITE_CONTACTS"/>\n    <application#' "$MANIFEST"

      - name: Sync web assets into the native project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-help-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
